<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSuggest</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
        }
        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            font-size: 20px;
            display: flex;
            justify-content: center;
        }

        input{
            padding: 8px;
            width: 250px;
        }
        .symbol{
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
        }
        .settings{
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
        }
        .first{
            font-weight: bold;
            color: blue;
        }
        .Search-box{
    position: relative;
    width: 500px;
    margin-top: 30px;
}

.Search-box input{
    width: 100%;
    padding: 18px 20px 18px 55px;
    border: 1px solid #d0d0d0;
    border-radius: 50px;
    font-size: 20px;
    outline: none;
    box-sizing: border-box;
}

.lens{
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    color: gray;
}
.suggetions{
border: 1px solid #ccc;
            margin-top: 20px;
            width: 40%;
            border-radius: 9px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
}
.suggestion-item{
            border: 1px solid black;
            padding: 10px;
            border-radius:10px;
        }
    </style>
    </head>
    <body>
       <div class = "symbol">
            <span>&#x2022; online | &#x1F552; -ms</span>
        </div>
        <div class ="settings">

            <span>&#9881;</span>
        </div>
    <div class="container">
       
        <div>
        <h1><span class = "first">Being</span>Infinity</h1>
         </div>
        <p>One million phrases. Four Algorithms. Prefix Based Auto suggest</p>

        <div class="Search-box">
    <span class="lens">&#128269;</span>
    <input id="search-Box" placeholder="Start Typing to Search">

    <div id="suggestions"></div>
    </div>
    </div>
    <script>
       var searchBox = document.getElementById("search-Box");
       searchBox.addEventListener("input",function(){
       // 1: get user typed text
       var userInput = searchBox.value;
       if(userInput.trim() === ""){
           
       }else{
          var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q="; 
           var url3 = "&algorithm=brute&limit=10&weighted=false";
           var url = url1+userInput+url3;
           fetch(url)
              .then(function(response){
                return response.json();

              })
              .then(function(data){
                    console.log(data);
                    var resultsArray = data.results;
                    var htmlResults = "";
                    for(var i =0; i<resultsArray.length;i++){
                        htmlResults +="<div class ='suggestion-item'>"+resultsArray[i].text+"</div>";
                    }
                    suggestions.innerHTML = htmlResults;
              })
       }
       // 2. make api call to get suggetions
       // 3.display data in html
    
       })

    </script>
    
</body>
</html>
